<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Kurdistan ATM Locations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon - SVG for modern browsers, PNG for fallback -->
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    
    <!-- Apple Touch Icon - PNG required for iOS compatibility -->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180x180.png">
    
    <!-- Additional icon sizes for various platforms -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Global Loading Spinner -->
        <div id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">Loading Locations...</div>
        </div>

        <!-- The Background Map -->
        <div id="map" class="map-container"></div>

        <!-- Safe Area Top for Mobile Notches -->
        <div class="safe-area-top"></div>

        <!-- Floating UI Overlays -->
        <div class="ui-layer">
            
            <!-- Floating Header & Filters Panel -->
            <header class="glass-panel main-header">
                <div class="header-top">
                    <div class="header-title">
                        <h1>Kurdistan ATM Locations</h1>
                    </div>
                </div>

                <div class="filters-container">
                    <div class="select-wrapper">
                        <select id="cityFilter" class="glass-select">
                            <option value="">All Cities</option>
                        </select>
                        <i class="select-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></i>
                    </div>
                    
                    <div class="select-wrapper">
                        <select id="bankFilter" class="glass-select">
                            <option value="">All Banks</option>
                        </select>
                        <i class="select-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></i>
                    </div>

                    <button id="themeToggle" class="glass-btn icon-btn" title="Toggle Theme">
                        <!-- Modern Sun Icon -->
                        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
                        <!-- Modern Moon Icon -->
                        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
                    </button>
                </div>
            </header>

            <!-- Floating Action Buttons (Right Side) -->
            <div class="floating-actions">
                <button id="locateBtn" class="glass-btn primary action-btn locate-icon" title="My Location">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                </button>
            </div>

            <!-- ATM List / Bottom Sheet -->
            <aside id="atmListPanel" class="glass-panel list-panel">
                <div class="drag-handle-container desktop-hidden">
                    <div class="drag-handle"></div>
                </div>
                
                <div class="list-header">
                    <h2>Nearby Locations</h2>
                    <span id="atmCount" class="badge">0</span>
                    <button id="closeListBtn" class="glass-btn close-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>

                <div id="listContent" class="list-content custom-scrollbar">
                    <!-- Populated by JS -->
                </div>
            </aside>
            
            <!-- Toggle List FAB (Visible on Mobile to expand list, or Desktop when side list closed) -->
            <button id="toggleListFab" class="glass-btn primary fab">
                <span>View ATMs</span>
            </button>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="app.js"></script>
    <script data-goatcounter="https://bilendm.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
